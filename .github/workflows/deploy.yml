name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate localized pages and sitemap
        run: node build-i18n.js

      - name: Validate site output
        run: node scripts/validate-site.js

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Stage served files into _site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='build-i18n.js' \
            --exclude='scripts/' \
            --exclude='locales/' \
            --exclude='node_modules/' \
            --exclude='*.md' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
